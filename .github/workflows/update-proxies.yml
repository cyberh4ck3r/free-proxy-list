name: Update Proxies

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/fetch-proxies.mjs

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update proxy lists"
          file_pattern: "*.txt"
